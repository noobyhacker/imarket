<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 450">
  <defs>
    <marker id="arrowBlue" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 14 5, 0 10" fill="#4B9BD6"/>
    </marker>
    <marker id="arrowBlack" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 14 5, 0 10" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- ── Circular exchange arrows  (center 320,148  r=85) ── -->

  <!-- Blue top arrow: upper-left → upper-right, clockwise over the top -->
  <path d="M 250 99 A 85 85 0 0 1 390 99"
        fill="none" stroke="#4B9BD6" stroke-width="5.5" stroke-linecap="round"
        marker-end="url(#arrowBlue)"/>

  <!-- Black bottom arrow: lower-right → lower-left, clockwise under the bottom -->
  <path d="M 390 197 A 85 85 0 0 1 250 197"
        fill="none" stroke="#1a1a1a" stroke-width="5.5" stroke-linecap="round"
        marker-end="url(#arrowBlack)"/>

  <!-- ── Sofa / armchair (blue stroke, left side) ── -->
  <rect x="260" y="130" width="38" height="20" rx="5" fill="none" stroke="#4B9BD6" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="257" y="147" width="44" height="15" rx="4" fill="none" stroke="#4B9BD6" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="253" y="138" width="8"  height="22" rx="4" fill="none" stroke="#4B9BD6" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="297" y="138" width="8"  height="22" rx="4" fill="none" stroke="#4B9BD6" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- ── Shopping bag (dark stroke, right side) ── -->
  <path d="M 339 156 Q 339 140 352 140 Q 365 140 365 156"
        fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <rect x="331" y="154" width="42" height="30" rx="4" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>

  <!-- ── "imarket" wordmark ── -->
  <text x="320" y="368"
        font-family="'Arial Rounded MT Bold','Nunito','Varela Round',Arial,sans-serif"
        font-size="128" font-weight="900" fill="#1a1a1a" text-anchor="middle">
    <tspan fill="#4B9BD6">i</tspan>market
  </text>

  <!-- ── Tagline ── -->
  <text x="320" y="412"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="16.5" fill="#999" text-anchor="middle" letter-spacing="2.5">
    USED ITEMS. FAIR TRADES. FOREIGNERS IN KOREA.
  </text>
</svg>
